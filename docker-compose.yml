x-airflow-common:
  &airflow-common
  build: .
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW_CONN_MINIO_CONN_ID: minio://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@minio:9000?secure=False
    OILPRICE_API_KEY: ${OILPRICE_API_KEY}
    FRED_API_KEY: ${FRED_API_KEY}
    EIA_API_KEY: ${EIA_API_KEY}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./spark_jobs:/opt/airflow/spark_jobs
  depends_on:
    - postgres
  networks:
    - data-platform

services:
  # Airflow PostgreSQL (оставляем как есть)
  postgres:
    image: postgres:15
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - data-platform

  # Новый PostgreSQL для данных MOEX
  postgres_data:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: moex
    ports:
      - "5433:5432"
    volumes:
      - postgres-data-volume:/var/lib/postgresql/data
    networks:
      - data-platform

  clickhouse:
    image: clickhouse/clickhouse-server:24.11
    ports:
      - "8124:8123"
      - "9001:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - data-platform

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9005:9000"
      - "9006:9001"
    volumes:
      - minio-data:/data
    networks:
      - data-platform

  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - data-platform

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - data-platform

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8086:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - data-platform

  spark-master:
    image: apache/spark:3.5.4-scala2.12-java17-python3-ubuntu
    command: bash -c "export SPARK_MASTER_HOST=spark-master && /opt/spark/sbin/start-master.sh && tail -f /dev/null"
    ports:
      - "7077:7077"
      - "8085:8080"
    volumes:
      - ./spark_jobs:/opt/spark_jobs
    networks:
      - data-platform
    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.4-scala2.12-java17-python3-ubuntu
    command: bash -c "/opt/spark/sbin/start-worker.sh spark://spark-master:7077 && tail -f /dev/null"
    depends_on:
      - spark-master
    ports:
      - "8088:8081"
    volumes:
      - ./spark_jobs:/opt/spark_jobs
    networks:
      - data-platform
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: -c "airflow db init && airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.org --password admin"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8087:8080"
    depends_on:
      - airflow-init
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init
    restart: always

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - data-platform

networks:
  data-platform:
    driver: bridge

volumes:
  postgres-db-volume:
  postgres-data-volume:
  clickhouse-data:
  minio-data:
  grafana-data: